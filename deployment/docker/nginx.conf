events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Resolver for Kubernetes DNS
    resolver 10.100.0.10 valid=30s ipv6=off;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy API requests to backend using variable (forces DNS resolution per request)
        location /api/ {
            set $backend "backend-service.shopsphere.svc.cluster.local:5000";
            proxy_pass http://$backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Serve React app
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
