services:
  mongodb:
    image: mongo:6
    container_name: shopsphere-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - shopsphere-network

  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.backend
    container_name: shopsphere-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/shopsphere
      - JWT_SECRET=${JWT_SECRET:-shopsphere_super_secret_key_2024}
      - NODE_ENV=production
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - shopsphere-network

  frontend:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.frontend
    container_name: shopsphere-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - shopsphere-network

volumes:
  mongodb_data:

networks:
  shopsphere-network:
    driver: bridge
