apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: shopsphere
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 040494736757.dkr.ecr.us-east-2.amazonaws.com/shopsphere-backend:latest
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: shopsphere-config
        - secretRef:
            name: shopsphere-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: shopsphere
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000
